<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Gallery</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
padding:20px;
text-align:center;
}

h1{
margin-bottom:20px;
}

/* gallery grid */
.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
max-width:700px;
margin:auto;
}

/* card style */
.card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.caption{
padding:8px;
font-size:14px;
font-weight:600;
}

/* mobile view */
@media (max-width:600px){
.gallery{
grid-template-columns:repeat(2,1fr);
}
}

</style>
</head>

<body>

<h1>PHOTO GALLERY</h1>

<div class="gallery">

<div class="card">
<img src="photos/Misty forest.jpg">
<div class="caption">Misty Forest</div>
</div>

<div class="card">
<img src="photos/Desert Dunes.jpg">
<div class="caption">Desert Dunes</div>
</div>

<div class="card">
<img src="photos/Sunflower Field.jpg">
<div class="caption">Sunflower</div>
</div>

<div class="card">
<img src="photos/Lone Tree.jpg">
<div class="caption">Lone Tree</div>
</div>

<div class="card">
<img src="photos/Coastline View.jpg">
<div class="caption">Coastline</div>
</div>

<div class="card">
<img src="photos/Mountain Lake.jpg">
<div class="caption">Mountain Lake</div>
</div>

<div class="card">
<img src="photos/Forest Path.jpg">
<div class="caption">Forest Path</div>
</div>

<div class="card">
<img src="photos/Sailing Boat.jpg">
<div class="caption">Sailboat</div>
</div>

<div class="card">
<img src="photos/Sunset Temple.jpg">
<div class="caption">SunsetTemple</div>
</div>

<div class="card">
<img src="photos/Green Valley.jpg">
<div class="caption">Greenvalley</div>
</div>

<div class="card">
<img src="photos/Snowy Mountain.jpg">
<div class="caption">SnowyMountain</div>
</div>

<div class="card">
<img src="photos/Waterfall View.jpg">
<div class="caption">Waterfall</div>
</div>

</div>

</body>
</html>
